<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOX TEST</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0d0d0d;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  .bg-orbs {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.25;
  }

  .orb-1 {
    width: 500px; height: 500px;
    background: radial-gradient(circle, #888 0%, #444 60%, transparent 100%);
    top: -100px; left: -100px;
    animation: drift1 12s ease-in-out infinite alternate;
  }

  .orb-2 {
    width: 400px; height: 400px;
    background: radial-gradient(circle, #aaa 0%, #555 60%, transparent 100%);
    bottom: -80px; right: -80px;
    animation: drift2 15s ease-in-out infinite alternate;
  }

  .orb-3 {
    width: 300px; height: 300px;
    background: radial-gradient(circle, #666 0%, #333 60%, transparent 100%);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    animation: drift3 10s ease-in-out infinite alternate;
  }

  @keyframes drift1 { to { transform: translate(60px, 80px); } }
  @keyframes drift2 { to { transform: translate(-50px, -60px); } }
  @keyframes drift3 { to { transform: translate(-50%, calc(-50% + 40px)) scale(1.1); } }

  .glass-wrapper {
    position: relative;
    z-index: 1;
    padding: 4px;
    border-radius: 60px;
    background: linear-gradient(135deg,
      rgba(255,255,255,0.35) 0%,
      rgba(255,255,255,0.05) 40%,
      rgba(255,255,255,0.15) 100%
    );
    animation: float 6s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-12px); }
  }

  .glass-pill {
    position: relative;
    padding: 36px 72px;
    border-radius: 56px;
    overflow: hidden;
    background: rgba(255, 255, 255, 0.06);
    backdrop-filter: blur(24px) saturate(180%);
    -webkit-backdrop-filter: blur(24px) saturate(180%);
    border: 1px solid rgba(255,255,255,0.18);
    box-shadow:
      0 0 0 0.5px rgba(255,255,255,0.08) inset,
      0 2px 40px rgba(0,0,0,0.6),
      0 0 80px rgba(180,180,180,0.04);
  }

  .glass-pill::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 56px;
    background: linear-gradient(135deg,
      rgba(255,255,255,0.18) 0%,
      rgba(255,255,255,0.03) 35%,
      transparent 60%,
      rgba(255,255,255,0.06) 100%
    );
    pointer-events: none;
  }

  .glass-pill::after {
    content: '';
    position: absolute;
    top: 6px; left: 20%; right: 20%;
    height: 1px;
    background: linear-gradient(90deg,
      transparent,
      rgba(255,255,255,0.5) 30%,
      rgba(255,255,255,0.7) 50%,
      rgba(255,255,255,0.5) 70%,
      transparent
    );
    border-radius: 50%;
    pointer-events: none;
  }

  .liquid-sheen {
    position: absolute;
    inset: 0;
    border-radius: 56px;
    background: radial-gradient(ellipse 60% 40% at 50% 20%,
      rgba(255,255,255,0.12) 0%,
      transparent 70%
    );
    animation: sheen 8s ease-in-out infinite alternate;
    pointer-events: none;
  }

  @keyframes sheen {
    0% { background-position: 30% 20%; opacity: 0.8; }
    100% { background-position: 70% 30%; opacity: 0.4; }
  }

  .glass-text {
    position: relative;
    z-index: 2;
    font-size: clamp(2.5rem, 6vw, 4.5rem);
    font-weight: 700;
    letter-spacing: 0.12em;
    color: rgba(255,255,255,0.95);
    text-shadow:
      0 1px 0 rgba(255,255,255,0.4),
      0 -1px 0 rgba(0,0,0,0.3),
      0 4px 20px rgba(0,0,0,0.5);
    user-select: none;
  }

  .glass-text span {
    display: inline-block;
    background: linear-gradient(180deg,
      rgba(255,255,255,1) 0%,
      rgba(220,220,220,0.85) 50%,
      rgba(180,180,180,0.7) 100%
    );
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
</style>
</head>
<body>

<div class="bg-orbs">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>

<div class="glass-wrapper">
  <div class="glass-pill">
    <div class="liquid-sheen"></div>
    <div class="glass-text"><span>LOX TEST</span></div>
  </div>
</div>

</body>
</html>
