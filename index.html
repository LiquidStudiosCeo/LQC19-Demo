<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theme Selector Web App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="theme-modal-overlay" class="modal-overlay">
        <div class="theme-modal">
            <h2>Select Your Theme</h2>
            <div class="theme-options">
                <div class="theme-card light-theme" onclick="selectTheme('light')">
                    <div class="preview-card">
                        <div class="preview-bg">
                            <div class="preview-lines">
                                <div class="line short"></div>
                                <div class="line long"></div>
                                <div class="line medium"></div>
                            </div>
                        </div>
                    </div>
                    <p>Light</p>
                </div>
                <div class="theme-card dark-theme" onclick="selectTheme('dark')">
                    <div class="preview-card">
                        <div class="preview-bg">
                            <div class="preview-lines">
                                <div class="line short"></div>
                                <div class="line long"></div>
                                <div class="line medium"></div>
                            </div>
                        </div>
                    </div>
                    <p>Dark</p>
                </div>
            </div>
            <button id="confirm-theme" class="primary-btn">Continue</button>
        </div>
    </div>

    <main id="main-content" class="hidden">
        <aside id="floating-sidebar" class="sidebar">
            <div class="sidebar-content">
                <span class="logo-text">LQC19</span>
                <button class="begin-btn">Begin Creating</button>
            </div>
        </aside>

        <div id="dream-text" class="hero-text">
            Lets make your dreams come true, truly for free.
        </div>

        <div id="main-card" class="content-card">
            <div class="card-inner">
                <textarea id="prompt-input" placeholder="Describe your dream..."></textarea>
                <button id="send-btn" class="send-btn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
        </div>
    </main>
    <script src="func.js"></script>
</body>
</html>
